<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tienda Tech</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

    <header>

        <h1>Tienda Tech</h1>

        <p>Productos de tecnología</p>

    </header>

    <nav>

        <a href="#productos">Productos</a>
        <a href="#resenas">Reseñas</a>
        <a href="#contacto">Contacto</a>

    </nav>

    <main>

        <section id="productos">

            <h2>Productos</h2>

            <div id="lista-productos" class="productos">

                <!-- Las tarjetas las crea JavaScript -->

            </div>

        </section>

        <section id="carrito">

            <h2>Carrito</h2>

            <p>Productos: <span id="contador">0</span></p>

            <div id="productos-carrito"></div>

            <h3>Total: $<span id="total">0</span></h3>

        </section>

        <section id="resenas">

            <h2>Reseñas</h2>

            <div class="resenas">

                <div>⭐⭐⭐⭐⭐ Muy buen servicio.</div>

                <div>⭐⭐⭐⭐ Excelente calidad.</div>

                <div>⭐⭐⭐⭐⭐ Lo recomiendo.</div>

            </div>

        </section>

        <section id="contacto">

            <h2>Contacto</h2>

            <form action="TU_LINK_DE_FORMSPREE" method="POST">

                <input type="text" name="nombre" placeholder="Nombre" required>

                <input type="email" name="email" placeholder="Correo" required>

                <textarea name="mensaje" placeholder="Mensaje"></textarea>

                <button type="submit">Enviar</button>

            </form>

        </section>

    </main>

    <footer>

        <p>© 2026 Tienda Tech</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
